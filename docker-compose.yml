version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: mysql-lite
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: pd-max-redis
    ports:
      - "6379:6379"

  backend:
    build:
      context: .
      args:
        PRELOAD_AI_ASSETS: ${PRELOAD_AI_ASSETS:-1}
    container_name: my-backend
    ports:
      - "8000:8000"
    depends_on:
      - mysql
      - redis
    environment:
      PORT: 8000
      AI_DETECTION_PRELOAD: ${AI_DETECTION_PRELOAD}
      AI_MAX_CONCURRENT_TASKS: ${AI_MAX_CONCURRENT_TASKS}
      AI_GC_MAX_AGE_HOURS: ${AI_GC_MAX_AGE_HOURS}
      AI_GC_INTERVAL_SECONDS: ${AI_GC_INTERVAL_SECONDS}
      AI_EASYOCR_MODEL_DIR: ${AI_EASYOCR_MODEL_DIR}
      AI_EASYOCR_DOWNLOAD_ENABLED: ${AI_EASYOCR_DOWNLOAD_ENABLED}
      TORCH_HOME: ${TORCH_HOME}
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_BASE_URL: ${LLM_BASE_URL}
      LLM_MODEL: ${LLM_MODEL}
      VLM_API_KEY: ${VLM_API_KEY}
      VLM_BASE_URL: ${VLM_BASE_URL}
      VLM_MODEL: ${VLM_MODEL}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/1}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/2}

volumes:
  mysql_data:
