paths:
  # FAISS 字体特征库路径
  font_lib_path: "models/font_lib"
  # XGBoost 全局排版校验模型路径
  xgb_model_path: "models/global_layout_model.pkl"
  # 日志文件路径
  log_file: "logs/system_run.log"

dataset:
  image_dir: "images"
  json_dir: "locate_json"

# 【新增】业务规则与几何参数
business_rules:
  roi_expand_margin: 15          # 局部微观分析时的外扩像素边距
  max_core_text_length: 15       # 核心金额字符串最大长度（超过此长度视为订单号/非核心项）
  auto_detect_account_field: true  # 未传 bbox 时 OCR 自动定位「收款账号」并做拼接检测

# 【新增】自适应判定权重
weights:
  core_pixel: 0.60               # 核心字段：像素异常的权重
  core_font: 0.40                # 核心字段：字体异常的权重
  non_core_pixel: 0.80           # 非核心字段：纯像素异常的权重
  pixel_overlap: 0.30            # 像素重叠/接缝检测权重

# 【更新】全局阈值控制中心
thresholds:
  global_fake: 0.65              # 全局大模型风险 > 此值，判定排版异常
  pixel_anomaly_alert: 0.60      # 局部像素风险 > 此值，触发拼接涂抹报警
  pixel_overlap_alert: 0.55      # 像素重叠风险 > 此值，触发重叠/拼接报警（legacy，分层规则优先）
  pixel_overlap_blend_alert: 0.55           # blend 分 >= 此值即告警
  pixel_overlap_structural_alert: 0.79      # structural 告警需同时满足 de_min
  pixel_overlap_structural_de_min: 0.018    # structural 告警所需最低双重边缘占比
  pixel_overlap_text_splice_alert: 0.38    # ELA/噪声条带文字替换告警阈值
  pixel_overlap_ela_corroboration_min: 0.22  # ELA 佐证 + structural 联合告警
  pixel_overlap_structural_text_min: 0.52    # 文字 ROI structural 联合告警下限
  pixel_overlap_text_splice_hard_min: 0.42  # 文字替换 hard 佐证阈值
  pixel_overlap_ela_hard_min: 0.28         # ELA hard 佐证阈值
  pixel_overlap_text_hard_score: 0.48      # 有 ELA 佐证时的 hard 最低总分
  pixel_overlap_hard_blend_min: 0.55        # hard 判所需最低 blend 分
  pixel_overlap_hard_de_min: 0.045          # hard 判所需最低双重边缘占比
  exempt_pixel_safe: 0.40        # 非核心字段的像素风险 < 此值，直接豁免清零

  suspect_high: 0.65             # 综合风险率 > 此值，最终定性为“篡改”
  suspect_low: 0.50              # 综合风险率 > 此值，最终定性为“可疑”

  timestamp_mismatch_risk: 0.58  # 时间不一致时的风险分
  timestamp_future_risk: 0.72    # 未来时间时的风险分
  timestamp_software_risk: 0.85  # EXIF 修图软件标记风险分
  timestamp_business_mismatch_risk: 0.58  # 业务单据时间与图内时间不一致（仅标「可疑」，不直接判篡改）
  business_time_tolerance_seconds: 300   # 单据时间与图内交易时间允许偏差（秒）
  business_compare_status_bar: false      # 业务单据时间是否与状态栏比对（截图时刻≠交易时刻，默认关闭）
  pixel_overlap_hard_tamper: 0.72        # 像素重叠分 >= 此值且满足佐证条件时直接判篡改
  pixel_overlap_hard_tamper_absolute: 0.82  # 像素重叠分 >= 此值无需佐证直接判篡改
  pixel_overlap_hard_tamper_requires_corroboration: true  # 中等重叠分需结合布局/局部像素等佐证
  bbox_iou_alert: 0.35                  # 检测框 IoU >= 此值触发重叠告警
  bbox_iou_hard_tamper: 0.70             # 检测框 IoU >= 此值直接判篡改
  bbox_iou_risk: 0.62                     # 检测框重叠风险分
  bbox_iou_hard_risk: 0.82
  timestamp_visible_missing_risk: 0.42    # 有单据时间但图内无可比对时间
  timestamp_unparsed_risk: 0.38             # 图内有疑似时间 OCR 但未能解析
  status_transaction_tolerance_minutes: 8   # 状态栏与交易时间一致容差（分钟）
  status_transaction_hard_min_minutes: 240  # 分钟差 >= 此值才 hard 判 status 不一致
  business_status_bar_tolerance_minutes: 8
  hard_tamper_anomalies:                 # 图内时间自洽类异常：出现即直接判篡改
    - exif_editing_software
    - future_datetime
    - status_transaction_time_mismatch
    - exif_visible_datetime_mismatch
  hard_semantic_anomalies:               # 语义规则硬判篡改
    - invalid_amount_format
    - detail_field_typography_anomaly
    - synthetic_image_signals
  semantic_amount_format_risk: 0.78       # 金额千分位格式异常风险分
  semantic_typography_risk: 0.72          # 明细行排版不一致风险分
  semantic_synthetic_risk: 0.75           # 无 EXIF 合成/AI 重绘风险分
  synthetic_bg_var_max: 0.08              # 背景方差低于此视为过于平滑
  synthetic_noise_std_max: 55.0           # 噪声标准差低于此视为异常
  synthetic_min_signals: 3                # 触发合成图判定的最少信号数
  # 业务单据比对（business_*）仅写入 timestamp_check.anomalies 并抬高风险至「可疑」，
  # 不列入 hard_tamper_anomalies，避免错误 document_time 导致真图一律判篡改。